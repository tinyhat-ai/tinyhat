name: Feature request
description: Suggest a new skill, new report section, new attribution signal, or other improvement.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today? What does the current behavior miss?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Tinyhat do instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're weaker.

  - type: dropdown
    id: area
    attributes:
      label: Area of Tinyhat
      multiple: true
      options:
        - Data gathering (gather_snapshot.py)
        - Report rendering (render_report.py / templates)
        - Skills (skill-audit, open-latest-audit, audit-history)
        - Routine / daily refresh
        - Docs
        - Install / distribution
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, example snapshots, prior art.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This fits Tinyhat's scope (local-only, read-only, no backend).
          required: true
