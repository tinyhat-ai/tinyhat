name: Feature request
description: Suggest a Tinyhat OpenClaw plugin capability, skill, package, or docs improvement.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What should a Tinyhat-managed OpenClaw agent be able to do?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What capability, skill, manifest field, or docs change should Tinyhat add?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - OpenClaw plugin manifest
        - Tool plugin implementation
        - Packaged skills
        - Telegram Mini App button behavior
        - Secret metadata / credential flow
        - Runtime/package inventory
        - Docs
        - CI / validation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, expected tool calls, or prior art.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This request fits the public plugin package scope.
          required: true
