name: Feature request
description: Suggest a Tinyhat plugin capability, skill, package, or docs improvement.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What should a Tinyhat-managed Hermes agent be able to do?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What capability, skill, manifest field, or docs change should Tinyhat add?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Hermes plugin manifest
        - Plugin tool implementation
        - Packaged skills
        - Docs
        - CI / validation
        - Other
    validations:
      required: true
