name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report.
        If this is a security issue, do not file it here. See SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: "The Tinyhat plugin does not render a Telegram secret-entry button when ..."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact OpenClaw/plugin commands, user prompt, or tool invocation.
      placeholder: |
        1. Install the plugin from this repo.
        2. Ask the agent to add OPENAI_API_KEY.
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include redacted logs or errors.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tinyhat version / commit
      description: Package version or commit SHA.
      placeholder: "0.1.8 (commit abc123)"
    validations:
      required: true

  - type: input
    id: openclaw
    attributes:
      label: OpenClaw/runtime version
      description: Include the runtime package ref if known.

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Telegram
        - OpenClaw tools
        - OpenClaw plugin install
        - Local development
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact tokens, URLs with signed intent data, and secret values.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This is not a security issue.
          required: true
