name: Bug report
description: Report something that is not working as expected.
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report.
        If this is a security issue, do not file it here. See SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact Hermes/plugin command, user prompt, or tool invocation.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include redacted logs or errors.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Tinyhat plugin version / commit
      description: Package version or commit SHA.
    validations:
      required: true
