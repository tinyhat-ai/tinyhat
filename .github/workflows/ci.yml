name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaging-guard:
    name: packaging-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dev-only assets stay out of packaged plugin surfaces
        run: bash .github/scripts/check_packaging.sh

      - name: Repo-local dev skills are wired for Codex and Claude
        run: python3 scripts/check_dev_skills.py

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip "ruff==0.6.9"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  smoke:
    name: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile scripts
        run: python -m compileall -q scripts

      - name: Validate OpenClaw package metadata
        run: python3 scripts/validate_openclaw_package.py

      - name: JavaScript syntax check
        run: node --check src/index.js
