name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaging-guard:
    name: packaging-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dev-only assets must not be in the packaged plugin
        run: bash .github/scripts/check_packaging.sh

      - name: Skill bodies must forward CLAUDE_PLUGIN_DATA to python3
        run: bash .github/scripts/check_skill_env_passthrough.sh

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade pip "ruff==0.6.9"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  smoke:
    name: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile scripts
        run: python -m compileall -q scripts

      - name: Gather snapshot against an empty machine
        run: |
          mkdir -p "$RUNNER_TEMP/tinyhat-ci/home"
          python3 scripts/gather_snapshot.py --output "$RUNNER_TEMP/tinyhat-ci/snapshot.json"
          test -s "$RUNNER_TEMP/tinyhat-ci/snapshot.json"

      - name: Render report with fallback analysis
        run: |
          python3 scripts/render_report.py \
            --snapshot "$RUNNER_TEMP/tinyhat-ci/snapshot.json" \
            --home-root "$RUNNER_TEMP/tinyhat-ci/home"
          test -s "$RUNNER_TEMP/tinyhat-ci/home/latest/report.html"
          test -s "$RUNNER_TEMP/tinyhat-ci/home/latest/report.md"
          test -s "$RUNNER_TEMP/tinyhat-ci/home/archive/index.html"

      - name: Archive + retention smoke test
        run: |
          python3 scripts/render_report.py \
            --snapshot "$RUNNER_TEMP/tinyhat-ci/snapshot.json" \
            --home-root "$RUNNER_TEMP/tinyhat-ci/home" \
            --archive
          ls "$RUNNER_TEMP/tinyhat-ci/home/archive/"

      - name: All-reports backlink points to the right path per target
        shell: bash
        run: |
          latest_html="$RUNNER_TEMP/tinyhat-ci/home/latest/report.html"
          dated_html=$(ls "$RUNNER_TEMP/tinyhat-ci/home/archive/"*/report.html | head -n1)
          grep -q 'href="../archive/index.html"[^>]*>all reports' "$latest_html"
          grep -q 'href="../index.html"[^>]*>all reports' "$dated_html"
          ! grep -q 'href="../archive/index.html"[^>]*>all reports' "$dated_html"

      - name: Routine CLI smoke test
        run: |
          python3 scripts/routine.py --home-root "$RUNNER_TEMP/tinyhat-ci/home" status
          python3 scripts/routine.py --home-root "$RUNNER_TEMP/tinyhat-ci/home" off
          python3 scripts/routine.py --home-root "$RUNNER_TEMP/tinyhat-ci/home" on
          python3 scripts/routine.py --home-root "$RUNNER_TEMP/tinyhat-ci/home" where
