name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "channels/**", "codex/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate package shape
        run: python3 scripts/validate_framework_package.py

      - name: Python unit tests
        run: python3 -m unittest discover -s test -p "*.py"

      - name: Byte-compile package
        run: python3 -m compileall -q .
